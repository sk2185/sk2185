name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: sk2185
          outputs: dist/snake.svg

      - name: Upload
        uses: actions/upload-artifact@v3
        with:
          name: snake
          path: dist/snake.svg
